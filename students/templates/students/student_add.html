{% extends 'base.html' %}

{% block title %}
Add Student
{% endblock %}

{% block hero %}

<div class="bg-primary text-white py-4">
    <div class="container text-center">
        <h1>
            <i class="fa-solid fa-user-plus"></i>
            Add New Student
        </h1>

        <p>Fill in the student details below.</p>
    </div>
</div>

{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Student Registration Form</h3>

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            First Name
                        </label>

                        <input
                            type="text"
                            name="first_name"
                            class="form-control"
                            placeholder="Enter First Name"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Last Name
                        </label>

                        <input
                            type="text"
                            name="last_name"
                            class="form-control"
                            placeholder="Enter Last Name"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Gender
                        </label>

                        <select
                            name="gender"
                            class="form-select"
                            required>

                            <option value="">Select Gender</option>

                            <option>Male</option>

                            <option>Female</option>

                            <option>Other</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Date of Birth
                        </label>

                        <input
                            type="date"
                            name="dob"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter Email"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Phone Number
                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            placeholder="Enter Phone Number"
                            required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Address
                    </label>

                    <textarea
                        name="address"
                        class="form-control"
                        rows="3"
                        placeholder="Enter Address"
                        required></textarea>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Department
                        </label>

                        <select
                            name="department"
                            class="form-select"
                            required>

                            <option value="">Select Department</option>

                            <option>Computer Science</option>

                            <option>Information Technology</option>

                            <option>Mechanical Engineering</option>

                            <option>Electrical Engineering</option>

                            <option>Civil Engineering</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Course
                        </label>

                        <select
                            name="course"
                            class="form-select"
                            required>

                            <option value="">Select Course</option>

                            <option>MCA</option>

                            <option>BCA</option>

                            <option>B.Tech</option>

                            <option>M.Tech</option>

                            <option>B.Sc</option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Admission Date
                        </label>

                        <input
                            type="date"
                            name="admission_date"
                            class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Student Photo
                        </label>

                        <input
                            type="file"
                            name="photo"
                            class="form-control"
                            accept="image/*">

                    </div>

                </div>

                <div class="text-center mt-4">

                    <button
                        type="submit"
                        class="btn btn-success btn-lg">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Student

                    </button>

                    <a href="{% url 'student_list' %}"
                       class="btn btn-secondary btn-lg">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back

                    </a>

                    <button
                        type="reset"
                        class="btn btn-warning btn-lg">

                        <i class="fa-solid fa-rotate"></i>

                        Reset

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
