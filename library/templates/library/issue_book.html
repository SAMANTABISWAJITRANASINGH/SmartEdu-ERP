{% extends 'base.html' %}
{% load static %}

{% block title %}
Issue Book
{% endblock %}

{% block hero %}

<div class="bg-primary text-white py-4">

    <div class="container text-center">

        <h1>

            <i class="fa-solid fa-book-open-reader"></i>

            Issue Book

        </h1>

        <p>Issue Library Book to Student</p>

    </div>

</div>

{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>

                Book Issue Form

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Student

                        </label>

                        <select
                            name="student"
                            class="form-select"
                            required>

                            <option value="">Select Student</option>

                            {% for student in students %}

                            <option value="{{ student.student_id }}">

                                {{ student.first_name }} {{ student.last_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Book

                        </label>

                        <select
                            name="book"
                            class="form-select"
                            required>

                            <option value="">Select Book</option>

                            {% for book in books %}

                            <option value="{{ book.book_id }}">

                                {{ book.title }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Issue Date

                        </label>

                        <input
                            type="date"
                            name="issue_date"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Return Date

                        </label>

                        <input
                            type="date"
                            name="return_date"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Issue Status

                    </label>

                    <select
                        name="status"
                        class="form-select"
                        required>

                        <option value="">Select Status</option>

                        <option value="Issued">

                            Issued

                        </option>

                        <option value="Returned">

                            Returned

                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Fine (₹)

                    </label>

                    <input
                        type="number"
                        name="fine"
                        class="form-control"
                        value="0">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Remarks

                    </label>

                    <textarea
                        name="remarks"
                        rows="4"
                        class="form-control"
                        placeholder="Optional Remarks"></textarea>

                </div>

                <div class="text-center">

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg">

                        <i class="fa-solid fa-book-open"></i>

                        Issue Book

                    </button>

                    <a
                        href="{% url 'book_list' %}"
                        class="btn btn-secondary btn-lg">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
