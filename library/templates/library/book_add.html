{% extends 'base.html' %}
{% load static %}

{% block title %}
Add Book
{% endblock %}

{% block hero %}

<div class="bg-primary text-white py-4">

    <div class="container text-center">

        <h1>

            <i class="fa-solid fa-book"></i>

            Add New Book

        </h1>

        <p>Library Book Management System</p>

    </div>

</div>

{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>

                Book Information

            </h3>

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Book Title

                        </label>

                        <input
                            type="text"
                            name="title"
                            class="form-control"
                            placeholder="Enter Book Title"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Author

                        </label>

                        <input
                            type="text"
                            name="author"
                            class="form-control"
                            placeholder="Enter Author Name"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Publisher

                        </label>

                        <input
                            type="text"
                            name="publisher"
                            class="form-control"
                            placeholder="Enter Publisher"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            ISBN Number

                        </label>

                        <input
                            type="text"
                            name="isbn"
                            class="form-control"
                            placeholder="ISBN Number"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Category

                        </label>

                        <select
                            name="category"
                            class="form-select"
                            required>

                            <option value="">Select Category</option>

                            <option>Programming</option>
                            <option>Computer Science</option>
                            <option>Database</option>
                            <option>Artificial Intelligence</option>
                            <option>Networking</option>
                            <option>Mathematics</option>
                            <option>Electronics</option>
                            <option>Science</option>
                            <option>Novel</option>
                            <option>General Knowledge</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Edition

                        </label>

                        <input
                            type="text"
                            name="edition"
                            class="form-control"
                            placeholder="Edition">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Total Copies

                        </label>

                        <input
                            type="number"
                            name="total_copies"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Available Copies

                        </label>

                        <input
                            type="number"
                            name="available_copies"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Book Cover

                    </label>

                    <input
                        type="file"
                        name="cover"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                        name="description"
                        rows="4"
                        class="form-control"
                        placeholder="Book Description"></textarea>

                </div>

                <div class="text-center">

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Book

                    </button>

                    <a
                        href="{% url 'book_list' %}"
                        class="btn btn-secondary btn-lg">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
