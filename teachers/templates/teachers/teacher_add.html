{% extends 'base.html' %}
{% load static %}

{% block title %}
Add Teacher
{% endblock %}

{% block hero %}
<div class="bg-success text-white py-4 text-center">
    <div class="container">
        <h1><i class="fa-solid fa-chalkboard-user"></i> Add Teacher</h1>
        <p>Register a new teacher into the Student Management System.</p>
    </div>
</div>
{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3>Teacher Registration Form</h3>
        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text"
                               name="first_name"
                               class="form-control"
                               placeholder="Enter First Name"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text"
                               name="last_name"
                               class="form-control"
                               placeholder="Enter Last Name"
                               required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Gender</label>

                        <select name="gender"
                                class="form-select"
                                required>

                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Date of Birth</label>

                        <input type="date"
                               name="dob"
                               class="form-control"
                               required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Email</label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter Email"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Phone Number</label>

                        <input type="text"
                               name="phone"
                               class="form-control"
                               placeholder="Enter Phone Number"
                               required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Address</label>

                    <textarea
                        name="address"
                        class="form-control"
                        rows="3"
                        placeholder="Enter Address"
                        required></textarea>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Qualification</label>

                        <input type="text"
                               name="qualification"
                               class="form-control"
                               placeholder="e.g. M.Tech, PhD"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Department</label>

                        <select name="department"
                                class="form-select"
                                required>

                            <option value="">Select Department</option>
                            <option>Computer Science</option>
                            <option>Information Technology</option>
                            <option>Mechanical</option>
                            <option>Electrical</option>
                            <option>Civil</option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Joining Date</label>

                        <input type="date"
                               name="joining_date"
                               class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Salary</label>

                        <input type="number"
                               name="salary"
                               class="form-control"
                               placeholder="Enter Salary"
                               required>

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">Teacher Photo</label>

                    <input type="file"
                           name="photo"
                           class="form-control">

                </div>

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-success btn-lg">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Teacher

                    </button>

                    <a href="{% url 'teacher_list' %}"
                       class="btn btn-secondary btn-lg">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
