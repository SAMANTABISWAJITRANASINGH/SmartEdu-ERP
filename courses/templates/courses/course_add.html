{% extends 'base.html' %}
{% load static %}

{% block title %}
Add Course
{% endblock %}

{% block hero %}

<div class="bg-primary text-white py-4">

    <div class="container text-center">

        <h1>

            <i class="fa-solid fa-book-open"></i>

            Add New Course

        </h1>

        <p>Create a New Course</p>

    </div>

</div>

{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>

                Course Registration Form

            </h3>

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Course Name

                        </label>

                        <input
                            type="text"
                            name="course_name"
                            class="form-control"
                            placeholder="Enter Course Name"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Course Code

                        </label>

                        <input
                            type="text"
                            name="course_code"
                            class="form-control"
                            placeholder="Enter Course Code"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Department

                        </label>

                        <select
                            name="department"
                            class="form-select"
                            required>

                            <option value="">Select Department</option>

                            <option>Computer Science</option>
                            <option>Information Technology</option>
                            <option>Mechanical</option>
                            <option>Electrical</option>
                            <option>Civil</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Duration

                        </label>

                        <input
                            type="text"
                            name="duration"
                            class="form-control"
                            placeholder="Example: 2 Years"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Course Fees

                        </label>

                        <input
                            type="number"
                            name="fees"
                            class="form-control"
                            placeholder="Enter Fees"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Total Seats

                        </label>

                        <input
                            type="number"
                            name="total_seats"
                            class="form-control"
                            placeholder="Enter Total Seats"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Available Seats

                        </label>

                        <input
                            type="number"
                            name="available_seats"
                            class="form-control"
                            placeholder="Enter Available Seats"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Course Coordinator

                        </label>

                        <input
                            type="text"
                            name="coordinator"
                            class="form-control"
                            placeholder="Coordinator Name"
                            required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Course Description

                    </label>

                    <textarea
                        name="description"
                        class="form-control"
                        rows="4"
                        placeholder="Enter Course Description"></textarea>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Course Image

                    </label>

                    <input
                        type="file"
                        name="photo"
                        class="form-control">

                </div>

                <div class="text-center">

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Course

                    </button>

                    <a
                        href="{% url 'course_list' %}"
                        class="btn btn-secondary btn-lg">

                        <i class="fa-solid fa-arrow-left"></i>

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
