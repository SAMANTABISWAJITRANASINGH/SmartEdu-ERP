{% extends 'base.html' %}
{% load static %}

{% block title %}
Add Attendance
{% endblock %}

{% block hero %}

<div class="bg-primary text-white py-4">

    <div class="container text-center">

        <h1>

            <i class="fa-solid fa-calendar-check"></i>

            Mark Student Attendance

        </h1>

        <p>Record Daily Student Attendance</p>

    </div>

</div>

{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>

                Attendance Form

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Student

                        </label>

                        <select
                            name="student"
                            class="form-select"
                            required>

                            <option value="">Select Student</option>

                            {% for student in students %}

                            <option value="{{ student.student_id }}">

                                {{ student.first_name }} {{ student.last_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Department

                        </label>

                        <input
                            type="text"
                            name="department"
                            class="form-control"
                            placeholder="Department"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Course

                        </label>

                        <input
                            type="text"
                            name="course"
                            class="form-control"
                            placeholder="Course"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Attendance Date

                        </label>

                        <input
                            type="date"
                            name="attendance_date"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Attendance Status

                    </label>

                    <select
                        name="status"
                        class="form-select"
                        required>

                        <option value="">Select Status</option>

                        <option value="Present">

                            ✅ Present

                        </option>

                        <option value="Absent">

                            ❌ Absent

                        </option>

                        <option value="Leave">

                            🟡 Leave

                        </option>

                    </select>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Remarks

                    </label>

                    <textarea
                        name="remarks"
                        rows="4"
                        class="form-control"
                        placeholder="Optional Remarks"></textarea>

                </div>

                <div class="text-center">

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Attendance

                    </button>

                    <a
                        href="{% url 'attendance_list' %}"
                        class="btn btn-secondary btn-lg">

                        <i class="fa-solid fa-arrow-left"></i>

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
