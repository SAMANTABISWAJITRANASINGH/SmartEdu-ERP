{% extends 'base.html' %}
{% load static %}

{% block title %}
Update Examination
{% endblock %}

{% block hero %}

<div class="bg-warning text-dark py-4">

    <div class="container text-center">

        <h1>

            <i class="fa-solid fa-pen-to-square"></i>

            Update Examination

        </h1>

        <p>Edit Student Examination Record</p>

    </div>

</div>

{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Update Examination</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Student

                        </label>

                        <select name="student" class="form-select" required>

                            {% for student in students %}

                            <option value="{{ student.student_id }}"
                            {% if examination.student.student_id == student.student_id %}selected{% endif %}>

                                {{ student.first_name }} {{ student.last_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Department

                        </label>

                        <input
                            type="text"
                            name="department"
                            class="form-control"
                            value="{{ examination.department }}"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Course

                        </label>

                        <input
                            type="text"
                            name="course"
                            class="form-control"
                            value="{{ examination.course }}"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Subject

                        </label>

                        <input
                            type="text"
                            name="subject"
                            class="form-control"
                            value="{{ examination.subject }}"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Exam Date

                        </label>

                        <input
                            type="date"
                            name="exam_date"
                            class="form-control"
                            value="{{ examination.exam_date|date:'Y-m-d' }}"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Total Marks

                        </label>

                        <input
                            type="number"
                            name="total_marks"
                            class="form-control"
                            value="{{ examination.total_marks }}"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Obtained Marks

                        </label>

                        <input
                            type="number"
                            name="obtained_marks"
                            class="form-control"
                            value="{{ examination.obtained_marks }}"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Grade

                        </label>

                        <select name="grade" class="form-select">

                            <option value="A+" {% if examination.grade == "A+" %}selected{% endif %}>A+</option>
                            <option value="A" {% if examination.grade == "A" %}selected{% endif %}>A</option>
                            <option value="B+" {% if examination.grade == "B+" %}selected{% endif %}>B+</option>
                            <option value="B" {% if examination.grade == "B" %}selected{% endif %}>B</option>
                            <option value="C" {% if examination.grade == "C" %}selected{% endif %}>C</option>
                            <option value="D" {% if examination.grade == "D" %}selected{% endif %}>D</option>
                            <option value="F" {% if examination.grade == "F" %}selected{% endif %}>F</option>

                        </select>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Result

                    </label>

                    <select name="result" class="form-select">

                        <option value="Pass"
                        {% if examination.result == "Pass" %}selected{% endif %}>

                            Pass

                        </option>

                        <option value="Fail"
                        {% if examination.result == "Fail" %}selected{% endif %}>

                            Fail

                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Remarks

                    </label>

                    <textarea
                        name="remarks"
                        rows="4"
                        class="form-control">{{ examination.remarks }}</textarea>

                </div>

                <div class="text-center">

                    <button
                        type="submit"
                        class="btn btn-warning btn-lg">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Update Examination

                    </button>

                    <a
                        href="{% url 'examination_list' %}"
                        class="btn btn-secondary btn-lg">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
